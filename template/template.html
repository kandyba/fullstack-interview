<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Технічна співбесіда з ...</title>
  <style>
    :root {
      --bg: #f9f9f9;
      --text: #1c1e21;
      --card: #ffffff;
      --border: #e5e7eb;
      --accent: #007bff;
      --code-bg: #f4f4f4;
    }

    [data-theme="dark"] {
      --bg: #1e1e1e;
      --text: #e2e2e2;
      --card: #2a2a2a;
      --border: #3c3c3c;
      --accent: #4aa8ff;
      --code-bg: #252526;
    }

    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0 20px;
      background-color: var(--bg);
      color: var(--text);
      transition: background 0.4s ease, color 0.4s ease;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      max-width: 800px;
      margin: 0 auto;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
      color: var(--accent);
    }

    .theme-toggle {
      background: none;
      border: none;
      font-size: 22px;
      color: var(--accent);
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .theme-toggle:hover {
      transform: rotate(20deg);
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      background: var(--card);
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      border-radius: 5px;
      border: 1px solid var(--border);
      transition: background 0.4s ease, border 0.4s ease;
    }

    .question {
      font-weight: bold;
      margin: 20px 0 10px;
      font-size: 25px;
      color: #4aa8ff;
    }

    .answer {
      margin-bottom: 20px;
    }

    .example {
      background: var(--code-bg);
      border-left: 4px solid var(--accent);
      padding: 10px;
      margin: 10px 0;
      overflow-x: auto;
      border-radius: 4px;
      transition: background 0.4s ease, border 0.4s ease;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .scroll-top {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      font-size: 14px;
      color: #fff;
      background-color: var(--accent);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .scroll-top:hover {
      background-color: #0056b3;
    }
  </style>
</head>

<body data-theme="dark">
<header>
  <h1>Технічна співбесіда ... </h1>
  <button id="themeToggle" class="theme-toggle" title="Змінити тему">☀️</button>
</header>

<div class="container">
  <div class="question">question</div>
  <div class="answer">
    <p>answer</p>
    <div class="example"><pre>&lt;code&gt;</pre></div>
  </div>

  <button class="scroll-top" onclick="scrollToTop()">Вгору</button>
</div>

<script>
  // === Scroll to top ===
  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // === Theme toggle ===
  const toggleBtn = document.getElementById('themeToggle');
  const body = document.body;
  const savedTheme = localStorage.getItem('theme') || 'dark';
  body.setAttribute('data-theme', savedTheme);
  toggleBtn.textContent = savedTheme === 'light' ? '🌙' : '☀️';

  toggleBtn.addEventListener('click', () => {
    const currentTheme = body.getAttribute('data-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    body.setAttribute('data-theme', newTheme);
    toggleBtn.textContent = newTheme === 'light' ? '🌙' : '☀️';
    localStorage.setItem('theme', newTheme);
  });
</script>
</body>
</html>
